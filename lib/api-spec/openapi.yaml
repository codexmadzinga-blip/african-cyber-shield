openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: phishing
    description: Phishing URL detection
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze:
    post:
      operationId: analyzeUrl
      tags: [phishing]
      summary: Analyze a URL for phishing indicators
      description: Runs heuristic analysis on a URL and returns a risk score, verdict, and list of flags.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UrlInput"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /analyze/batch:
    post:
      operationId: analyzeUrlBatch
      tags: [phishing]
      summary: Analyze multiple URLs
      description: Runs heuristic analysis on up to 20 URLs at once.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchUrlInput"
      responses:
        "200":
          description: List of analysis results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    UrlInput:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          minLength: 1
    BatchUrlInput:
      type: object
      required:
        - urls
      properties:
        urls:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 20
    AnalysisResult:
      type: object
      required:
        - url
        - score
        - verdict
        - riskLevel
        - flags
      properties:
        url:
          type: string
        score:
          type: integer
          minimum: 0
          maximum: 100
        verdict:
          type: string
        riskLevel:
          type: string
        flags:
          type: array
          items:
            type: string
        details:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
