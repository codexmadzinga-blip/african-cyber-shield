openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: phishing
    description: Phishing URL detection
  - name: history
    description: Scan history
  - name: password
    description: Password strength checking
paths:
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the returnTo path on success.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze:
    post:
      operationId: analyzeUrl
      tags: [phishing]
      summary: Analyze a URL for phishing indicators
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UrlInput"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /analyze/batch:
    post:
      operationId: analyzeUrlBatch
      tags: [phishing]
      summary: Analyze multiple URLs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchUrlInput"
      responses:
        "200":
          description: List of analysis results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /history:
    get:
      operationId: getHistory
      tags: [history]
      summary: Get recent scan history
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - in: query
          name: riskLevel
          schema:
            type: string
      responses:
        "200":
          description: List of past scans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryResponse"
  /history/{id}:
    delete:
      operationId: deleteScan
      tags: [history]
      summary: Delete a scan record
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /password/check:
    post:
      operationId: checkPassword
      tags: [password]
      summary: Check password strength
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordInput"
      responses:
        "200":
          description: Password strength result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /history/stats:
    get:
      operationId: getHistoryStats
      tags: [history]
      summary: Aggregate stats across all scans
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryStats"
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
    UrlInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
          minLength: 1
    BatchUrlInput:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 20
    OwaspHit:
      type: object
      required: [id, name, description]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
    AnalysisResult:
      type: object
      required: [url, score, verdict, riskLevel, flags, owaspCategories]
      properties:
        url:
          type: string
        score:
          type: integer
          minimum: 0
          maximum: 100
        verdict:
          type: string
        riskLevel:
          type: string
        flags:
          type: array
          items:
            type: string
        owaspCategories:
          type: array
          items:
            $ref: '#/components/schemas/OwaspHit'
        details:
          type: object
          additionalProperties: true
    ScanRecord:
      type: object
      required: [id, url, score, verdict, riskLevel, flags, createdAt]
      properties:
        id:
          type: integer
        url:
          type: string
        score:
          type: integer
        verdict:
          type: string
        riskLevel:
          type: string
        flags:
          type: array
          items:
            type: string
        details:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
    HistoryResponse:
      type: object
      required: [scans, total]
      properties:
        scans:
          type: array
          items:
            $ref: "#/components/schemas/ScanRecord"
        total:
          type: integer
    HistoryStats:
      type: object
      required: [total, safe, suspicious, likelyPhishing, phishing, avgScore]
      properties:
        total:
          type: integer
        safe:
          type: integer
        suspicious:
          type: integer
        likelyPhishing:
          type: integer
        phishing:
          type: integer
        avgScore:
          type: number
    DeleteResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    PasswordInput:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 1
    PasswordChecks:
      type: object
      required:
        - length_8
        - length_12
        - has_uppercase
        - has_lowercase
        - has_digit
        - has_special
        - no_common
        - no_repeated
        - no_sequential
        - no_keyboard_walk
      properties:
        length_8:       { type: boolean }
        length_12:      { type: boolean }
        has_uppercase:  { type: boolean }
        has_lowercase:  { type: boolean }
        has_digit:      { type: boolean }
        has_special:    { type: boolean }
        no_common:      { type: boolean }
        no_repeated:    { type: boolean }
        no_sequential:  { type: boolean }
        no_keyboard_walk: { type: boolean }
    PasswordResult:
      type: object
      required:
        - passwordLength
        - score
        - grade
        - strength
        - checks
        - feedback
        - suggestions
        - entropy
        - timeToCrack
      properties:
        passwordLength:
          type: integer
        score:
          type: integer
          minimum: 0
          maximum: 100
        grade:
          type: string
        strength:
          type: string
        checks:
          $ref: "#/components/schemas/PasswordChecks"
        feedback:
          type: array
          items:
            type: string
        suggestions:
          type: array
          items:
            type: string
        entropy:
          type: number
        timeToCrack:
          type: string
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
